name: Scrape Rojadirecta HD

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write           # needed to push data/matches.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run scraper ─────────────────────────────────────────────────
      - name: Run scraper
        run: python scrape.py

      # ── 5. Commit & push updated JSON ──────────────────────────────────
      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          # Only commit when there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update matches.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
